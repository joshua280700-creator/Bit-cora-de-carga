<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buscador de Andenes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --primary-color: #1e293b;
            --accent-color: #2563eb;
            --badge-color: #dc2626;
            --wave-color: #7c3aed;
            --bg-color: #f8fafc;
            --text-color: #334155;
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            padding: 8px; 
            color: var(--text-color); 
            margin: 0;
        }

        .container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: white; 
            padding: 14px; 
            border-radius: 14px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
        }

        h1 { 
            text-align: center; 
            color: var(--primary-color); 
            font-size: 20px;
            margin: 4px 0; 
        }

        p.subtitle { 
            text-align: center; 
            color: #64748b; 
            font-size: 12px;
            margin: 0 0 16px 0; 
        }
        
        .search-container { 
            position: relative; 
            margin-bottom: 14px; 
        }

        input[type="text"] { 
            width: 100%; 
            padding: 12px 14px 12px 38px; 
            border: 2px solid #e2e8f0; 
            border-radius: 10px; 
            font-size: 16px; /* 16px es crucial en móviles para evitar que iOS/Android hagan zoom molesto al escribir */
            box-sizing: border-box; 
            transition: all 0.2s;
            background: #f1f5f9;
        }

        input[type="text"]:focus { 
            border-color: var(--accent-color); 
            background: white;
            outline: none; 
        }

        .search-icon { 
            position: absolute; 
            left: 12px; 
            top: 50%; 
            transform: translateY(-50%); 
            font-size: 14px; 
            color: #94a3b8;
        }
        
        .status-message { 
            text-align: center; 
            font-weight: bold; 
            padding: 10px; 
            border-radius: 10px; 
            margin-bottom: 14px; 
            font-size: 13px;
        }
        .loading { background-color: #fef3c7; color: #92400e; }
        .error { background-color: #fee2e2; color: #991b1b; }
        .hidden { display: none; }

        .table-container {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: white;
            font-size: 14px;
        }

        th, td { 
            text-align: left; 
            padding: 12px 8px; 
            border-bottom: 1px solid #f1f5f9; 
        }

        th { 
            background-color: var(--primary-color); 
            color: white; 
            font-weight: 600; 
            font-size: 12px;
            text-transform: uppercase;
        }

        tr:last-child td {
            border-bottom: none;
        }
        
        .no-results { 
            text-align: center; 
            color: #64748b; 
            padding: 20px; 
            font-style: italic; 
        }
        
        .badge-anden { 
            background-color: var(--badge-color); 
            color: white; 
            padding: 5px 8px; 
            border-radius: 6px; 
            font-weight: bold; 
            display: inline-block; 
            text-align: center;
            font-size: 13px;
        }

        .badge-wave {
            background-color: var(--wave-color); 
            color: white; 
            padding: 5px 8px; 
            border-radius: 6px; 
            font-size: 13px; 
            font-weight: bold;
            display: inline-block;
            text-align: center;
        }

        .route-id { 
            font-family: monospace; 
            font-size: 14px; 
            color: var(--primary-color); 
            font-weight: bold; 
        }

        .driver-name {
            font-weight: 600;
            color: #1e293b;
            word-break: break-word; /* Permite que nombres largos se ajusten sin romper la tabla */
        }

        /* Ajustes finos para pantallas muy angostas */
        @media (max-width: 360px) {
            th, td {
                padding: 10px 4px;
                font-size: 13px;
            }
            .badge-anden, .badge-wave {
                padding: 4px 6px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📍 Control de Andenes</h1>
        <p class="subtitle">Monitoreo rápido para supervisión móvil</p>
        
        <div id="statusBox" class="status-message loading">Cargando datos de rutas...</div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Buscar por Ruta o Conductor..." onkeyup="filterTable()" disabled>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th># Ruta</th>
                        <th>Conductor</th>
                        <th>Andén</th>
                        <th>Oleada</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let combinedData = [];

        async function init() {
            try {
                // Configuración de los archivos asignados en la raíz de tu GitHub
                const urlViajes = 'Viajes.csv';
                const urlMuelle = 'Muelle.csv';

                const [resViajes, resMuelle] = await Promise.all([
                    fetch(urlViajes),
                    fetch(urlMuelle)
                ]);

                if (!resViajes.ok || !resMuelle.ok) {
                    throw new Error("Archivos no encontrados.");
                }

                const textViajes = await resViajes.text();
                const textMuelle = await resMuelle.text();

                const dataViajes = Papa.parse(textViajes, { header: true, skipEmptyLines: true }).data;
                const dataMuelle = Papa.parse(textMuelle, { header: true, skipEmptyLines: true }).data;

                // Estructura del catálogo mapeando por ID base de ruta
                const muelleMap = {};
                dataMuelle.forEach(row => {
                    const idMuelleRaw = row['ID'];
                    const anden = row['Muelle de salida'];
                    if (idMuelleRaw && anden) {
                        const parts = String(idMuelleRaw).split('-');
                        const baseId = parts[0].trim();
                        // Si viene un número después del guion, lo guarda directamente (ej. "2")
                        const oleada = parts.length > 1 ? parts[1].trim() : '-';
                        
                        muelleMap[baseId] = {
                            anden: String(anden).trim(),
                            oleada: oleada
                        };
                    }
                });

                // Cruce final ordenado de columnas
                dataViajes.forEach(row => {
                    const idRuta = String(row['ID']).trim();
                    if (idRuta) {
                        const muelleInfo = muelleMap[idRuta];
                        combinedData.push({
                            Ruta: idRuta,
                            Conductor: (row['Conductor'] || '').trim(),
                            Anden: muelleInfo ? muelleInfo.anden : 'N/A',
                            Oleada: muelleInfo ? muelleInfo.oleada : '-'
                        });
                    }
                });

                document.getElementById('statusBox').classList.add('hidden');
                document.getElementById('searchInput').disabled = false;
                renderTable('');

            } catch (error) {
                console.error(error);
                const statusBox = document.getElementById('statusBox');
                statusBox.className = 'status-message error';
                statusBox.textContent = "Error: Verifica que 'Viajes.csv' y 'Muelle.csv' estén arriba en tu repositorio.";
            }
        }

        function renderTable(filter) {
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";
            const lowerFilter = filter.toLowerCase().trim();
            
            const filteredData = combinedData.filter(item => 
                item.Ruta.toLowerCase().includes(lowerFilter) || 
                item.Conductor.toLowerCase().includes(lowerFilter)
            );

            if (filteredData.length === 0) {
                tbody.innerHTML = "<tr><td colspan='4' class='no-results'>Sin coincidencias</td></tr>";
                return;
            }

            filteredData.forEach(item => {
                const tr = document.createElement("tr");
                const andenStyle = item.Anden === 'N/A' ? 'style="background-color: #64748b;"' : '';
                
                tr.innerHTML = `
                    <td class="route-id">${item.Ruta}</td>
                    <td class="driver-name">${item.Conductor}</td>
                    <td><span class="badge-anden" ${andenStyle}>${item.Anden}</span></td>
                    <td><span class="badge-wave">${item.Oleada}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterTable() {
            const query = document.getElementById("searchInput").value;
            renderTable(query);
        }

        window.onload = init;
    </script>
</body>
</html>
